# Ralph Global Configuration
# Override per-project via ~/.ralph/projects/<hash>/config.yml

default_provider: claude
default_mode: plan-build-review
max_iterations: 50
worktree_default: true

# Stuck detection: skip task after N consecutive failures
max_stuck: 3

# Remote backup: push to GitHub after each commit
backup_enabled: false

# Default models per provider
# KEEP CURRENT: Update these when new model versions release.
# This file is the single source of truth for default model IDs.
# Loop scripts and setup commands inherit from here.
# Last updated: 2026-02-21
models:
  claude: opus               # Claude Opus 4.6 (latest)
  codex: gpt-5.3-codex       # OpenAI Codex (latest)
  gemini: gemini-3.1-pro-preview  # Gemini Pro 3.1 Preview (latest, NOT GA)
  copilot: gpt-5.3-codex     # Copilot default (latest)

# Retry/fallback models
retry_models:
  copilot: claude-sonnet-4.6  # Claude Sonnet 4.6 (fallback)
  gemini: null                 # fallback: no explicit model flag

# Round-robin provider order (when provider=round-robin)
round_robin_order:
  - claude
  - codex
  - gemini
  - copilot
