name: CI

on:
  push:
    branches: [master, agent/*, aloop/*]
  pull_request:
    branches: [master, agent/*, aloop/*]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache CLI node_modules
        uses: actions/cache@v3
        with:
          path: aloop/cli/node_modules
          key: cli-node-modules-${{ hashFiles('aloop/cli/package-lock.json') }}
          restore-keys: |
            cli-node-modules-

      - name: Install CLI dependencies
        working-directory: aloop/cli
        run: npm ci

      - name: Run CLI type check
        working-directory: aloop/cli
        run: npm run type-check

      - name: Cache Dashboard node_modules
        uses: actions/cache@v3
        with:
          path: aloop/cli/dashboard/node_modules
          key: dashboard-node-modules-${{ hashFiles('aloop/cli/dashboard/package-lock.json') }}
          restore-keys: |
            dashboard-node-modules-

      - name: Install Dashboard dependencies
        working-directory: aloop/cli/dashboard
        run: npm ci

      - name: Run Dashboard type check
        working-directory: aloop/cli/dashboard
        run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache CLI node_modules
        uses: actions/cache@v3
        with:
          path: aloop/cli/node_modules
          key: cli-node-modules-${{ hashFiles('aloop/cli/package-lock.json') }}
          restore-keys: |
            cli-node-modules-

      - name: Install dependencies
        working-directory: aloop/cli
        run: npm ci

      - name: Run build
        working-directory: aloop/cli
        run: npm run build

  cli-tests:
    name: CLI Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache CLI node_modules
        uses: actions/cache@v3
        with:
          path: aloop/cli/node_modules
          key: cli-node-modules-${{ hashFiles('aloop/cli/package-lock.json') }}
          restore-keys: |
            cli-node-modules-
      - name: Install dependencies
        working-directory: aloop/cli
        run: npm ci

      - name: Run CLI tests
        working-directory: aloop/cli
        run: npm test

  dashboard-tests:
    name: Dashboard Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Dashboard node_modules
        uses: actions/cache@v3
        with:
          path: aloop/cli/dashboard/node_modules
          key: dashboard-node-modules-${{ hashFiles('aloop/cli/dashboard/package-lock.json') }}
          restore-keys: |
            dashboard-node-modules-
      - name: Install dashboard dependencies
        working-directory: aloop/cli/dashboard
        run: npm ci

      - name: Run dashboard unit tests
        working-directory: aloop/cli/dashboard
        run: npm test

  loop-script-tests:
    name: Loop Script Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run shell script tests
        run: |
          chmod +x aloop/bin/loop.sh
          for f in aloop/bin/*.tests.sh; do
              echo "Running $f"
              bash "$f"
          done

      - name: Run PowerShell script tests
        shell: pwsh
        run: |
          Invoke-Pester ./aloop/bin/loop.tests.ps1 -Output Detailed
