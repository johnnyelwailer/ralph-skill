name: CI

# Issue #200: CI trigger branches include agent/* and aloop/* for orchestrator-managed branches
on:
  push:
    branches: ['master', 'agent/*', 'aloop/*']
  pull_request:
    branches: ['master', 'agent/*', 'aloop/*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            aloop/cli/package-lock.json
            aloop/cli/dashboard/package-lock.json

      - name: Install CLI dependencies
        working-directory: aloop/cli
        run: npm ci

      - name: Run CLI type check
        working-directory: aloop/cli
        run: npm run type-check

      - name: Install Dashboard dependencies
        working-directory: aloop/cli/dashboard
        run: npm ci

      - name: Run Dashboard type check
        working-directory: aloop/cli/dashboard
        run: npm run type-check

  cli-tests:
    name: CLI Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: aloop/cli/package-lock.json

      - name: Install dependencies
        working-directory: aloop/cli
        run: npm ci

      - name: Build CLI
        working-directory: aloop/cli
        run: npm run build

      - name: Run CLI tests
        working-directory: aloop/cli
        run: npm test

  dashboard-tests:
    name: Dashboard Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: aloop/cli/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: aloop/cli/dashboard
        run: npm ci

      - name: Run dashboard unit tests
        working-directory: aloop/cli/dashboard
        run: npm test

  dashboard-e2e:
    name: Dashboard E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            aloop/cli/package-lock.json
            aloop/cli/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: aloop/cli
        run: npm ci

      - name: Install dashboard dependencies
        working-directory: aloop/cli/dashboard
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('aloop/cli/dashboard/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        working-directory: aloop/cli/dashboard
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: aloop/cli/dashboard
        run: npm run test:e2e

  loop-script-tests:
    name: Loop Script Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run loop.sh tests
        working-directory: aloop/bin/tests
        run: bats loop.bats

      - name: Run shell script tests
        run: |
          chmod +x aloop/bin/loop.sh
          set -e
          for f in aloop/bin/*.tests.sh; do
              echo "Running $f"
              bash "$f"
          done

      - name: Run PowerShell script tests
        shell: pwsh
        run: |
          Invoke-Pester ./aloop/bin/loop.tests.ps1 -Output Detailed
