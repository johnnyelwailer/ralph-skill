name: CI

on:
  push:
    branches: [master, agent/*]
  pull_request:
    branches: [master, agent/*]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install CLI dependencies
        working-directory: aloop/cli
        run: npm ci

      - name: Install Dashboard dependencies
        working-directory: aloop/cli/dashboard
        run: npm ci

      - name: Type-check CLI
        working-directory: aloop/cli
        run: npx tsc --noEmit

      - name: Type-check Dashboard
        working-directory: aloop/cli/dashboard
        run: npx tsc --noEmit

      - name: Run CLI tests
        working-directory: aloop/cli
        run: npm test
