name: CI

on:
  push:
    branches: [master, agent/trunk, next]
  pull_request:
    branches: [master, agent/trunk, next]

jobs:
  aloopd-core:
    name: aloopd core (Bun typecheck + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install
        run: bun install

      - name: Typecheck
        run: bun x tsc -p packages/core/tsconfig.json

      - name: Test
        run: bun test packages/core/tests

  dashboard-tests:
    name: Dashboard Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dashboard dependencies
        working-directory: aloop/cli/dashboard
        run: npm ci

      - name: Run dashboard unit tests
        working-directory: aloop/cli/dashboard
        run: npm test
