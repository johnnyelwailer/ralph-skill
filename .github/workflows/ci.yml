name: CI

on:
  push:
    branches: [master, agent/trunk]
  pull_request:
    branches: [master, agent/trunk]

jobs:
  dashboard-tests:
    name: Dashboard Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dashboard dependencies
        working-directory: aloop/cli/dashboard
        run: npm ci

      - name: Run dashboard unit tests
        working-directory: aloop/cli/dashboard
        run: npm test

  loop-script-tests:
    name: Loop Script Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run loop.sh tests
        working-directory: aloop/bin/tests
        run: bats loop.bats
