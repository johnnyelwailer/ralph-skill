name: CI

on:
  push:
    branches: [master, next]
  pull_request:
    branches: [master, next]

jobs:
  aloopd-core:
    name: aloopd core (Bun typecheck + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install
        run: bun install

      - name: Constitution Checks
        run: bun run check:constitution

      - name: Typecheck
        run: bun --filter '*' typecheck

      - name: Test
        run: bun test
