# Continuous cycle — repeats until all tasks done at cycle boundary
pipeline:
  - agent: plan
  - agent: build
    repeat: 5
    onFailure: retry
  - agent: qa
  - agent: review
    onFailure: goto build

# Completion chain — loaded into queue when all tasks done at cycle boundary.
# Processed sequentially. If any agent adds TODOs, remaining items are flushed
# and the cycle resumes. Only proof completing with zero new TODOs ends the loop.
rattail:
  - PROMPT_spec-gap.md
  - PROMPT_docs.md
  - PROMPT_spec-review.md
  - PROMPT_final-review.md
  - PROMPT_final-qa.md
  - PROMPT_proof.md
