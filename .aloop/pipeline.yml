# Continuous cycle — repeats until all tasks done at cycle boundary
pipeline:
  - agent: plan
  - agent: build
    repeat: 5
    onFailure: retry
  - agent: qa
  - agent: review
    onFailure: goto build

# Completion finalizer — runs once when all tasks done at cycle boundary.
# Processed sequentially. If any agent adds TODOs, finalizer aborts
# (resets to position 0) and the cycle resumes.
# Only the last agent completing with zero new TODOs ends the loop.
finalizer:
  - PROMPT_spec-gap.md
  - PROMPT_docs.md
  - PROMPT_spec-review.md
  - PROMPT_final-review.md
  - PROMPT_final-qa.md
  - PROMPT_proof.md

# Orchestrator event→prompt mapping.
# process-requests scans issue state, matches filters, queues the prompt.
# No hardcoded agent knowledge in the runtime.
orchestrator_events:
  refine:
    prompt: PROMPT_orch_refine.md
    batch: 3
    filter:
      status: "Needs refinement"
      refined: false
      dor_validated: false
    result_pattern: "refine-result-{issue_number}.json"

  estimate:
    prompt: PROMPT_orch_estimate.md
    batch: 5
    filter:
      status: "Needs refinement"
      refined: true
      dor_validated: false
    result_pattern: "estimate-result-{issue_number}.json"

  sub_decompose:
    prompt: PROMPT_orch_sub_decompose.md
    batch: 1
    filter:
      status: "Needs decomposition"
    result_pattern: "sub-decomposition-result-{issue_number}.json"

  cr_analysis:
    prompt: PROMPT_orch_cr_analysis.md
    batch: 2
    filter:
      is_change_request: true
      cr_spec_updated: false
    result_pattern: "cr-analysis-result-{issue_number}.json"
