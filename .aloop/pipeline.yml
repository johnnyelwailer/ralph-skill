# Continuous cycle — repeats until all tasks done at cycle boundary
pipeline:
  - agent: plan
  - agent: build
    repeat: 5
    onFailure: retry
  - agent: qa
  - agent: review
    onFailure: goto build

# Completion chain (rattail) is NOT configured here — it's defined by
# trigger: fields in prompt frontmatter. The runtime resolves the chain:
#   all_tasks_done → spec-gap → docs → spec-review → final-review → final-qa → proof
# See PROMPT_*.md trigger: values for the actual chain definition.
